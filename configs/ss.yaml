command:
  - ss

rules:
  - pattern: \[.*\]
    name: status
    colors: [green]

  - pattern: \s((?:\d+\.){3}\d+|\*|\[?[\da-fA-F\.:]+\]?|[\w\d\-\_\.]+)(%[\w\d]+)?:(\S+)\s+\s((?:\d+\.){3}\d+|\*|\[?[\da-fA-F\.:]+\]?|[\w\d\-\_\.]+):(\S+)
    name: Local Address:Port   Peer Address:Port
    colors: [default, bright_green, blue, bright_red, cyan, magenta]

  - pattern: \("([^"]+)",
    name: process name
    colors: [blue]

  - pattern: ^IPX.*[\dABCDEF]+:[\dABCDEF]+
    name: ipx hostname
    colors: [green]

  - pattern: (^tcp|^udp|^unix|^IPX|STREAM|DGRAM)
    name: protocols
    colors: [magenta]

  - pattern: ^udp
    name: protocols UDP
    colors: [yellow]

  - pattern: ^tcp
    name: protocols TCP
    colors: [blue]

  - pattern: UNCONN
    name: status UNCONN
    colors: [dark red]

  - pattern: FIN_WAIT.*
    name: status
    colors: [red]

  - pattern: SYN.*?
    name: status
    colors: [bold red]

  - pattern: LISTEN(ING)?
    name: status
    colors: [bold blue]

  - pattern: TIME_WAIT
    name: status
    colors: [bold red]

  - pattern: CLOS(E(_WAIT)?|ING)
    name: status
    colors: [red]
    skip: true

  - pattern: LAST_ACK
    name: status
    colors: [red]

  - pattern: ESTAB.*?\b|CONNECTED
    name: status
    colors: [bold yellow]

  - pattern: FREE
    name: status
    colors: [bold green]

  - pattern: DISCONNECTING
    name: status
    colors: [red]

  - pattern: CONNECTING
    name: status
    colors: [green]

  - pattern: UNKNOWN
    name: status
    colors: [blink bold red]

  - pattern: (\@)[\dabcdef]+
    name: path
    colors: [green, bold green]

  - pattern: \d+sec
    name: timer
    colors: [yellow]

  - pattern: (Netid|State).*$
    name: Skip header
    colors: [default]
