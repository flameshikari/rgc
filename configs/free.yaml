command:
  - free

rules:
  - pattern: \s\d*[.,]?\dKi?|\b\d{1,3}\b
    name: Size 'K'
    colors: [green]

  - pattern: \s\d*[.,]?\dMi?|\b\d{4,6}\b
    name: Size 'M'
    colors: [yellow]

  - pattern: \s\d*[.,]?\dGi?|\b\d{7,9}\b
    name: Size 'G'
    colors: [red]

  - pattern: \s\d*[.,]?\dTi?|\b\d{10,12}\b
    name: Size 'T'
    colors: [bold red]

  - pattern: ^Mem
    name: Mem
    colors: [bold cyan]

  - pattern: ^Swap
    name: Swap
    colors: [bold magenta]

  - pattern: \s+0\w?(\s|$)
    name: Zero
    colors: [green]
