command:
  - ls

rules:
  - pattern: \s+(\d{7}|\d(?:[,.]?\d+)?[KM])(?=\s[A-Z][a-z]{2}\s)
    name: 'size: 1M <= size < 10M'
    colors: [green]

  - pattern: \s+(\d{8}|\d\d(?:[,.]?\d+)?M)(?=\s[A-Z][a-z]{2}\s)
    name: 'size: 10M <= size < 100M'
    colors: [yellow]

  - pattern: \s+(\d{9}|\d{3}M)(?=\s[A-Z][a-z]{2}\s)
    name: 'size: 100M <= size < 1G'
    colors: [red]

  - pattern: \s+(\d{10,}|[\d.,]+G)(?=\s[A-Z][a-z]{2}\s)
    name: 'size: 1G <= size'
    colors: [bold red]

  - pattern: \s(\d+),\s+(\d+)\s
    name: device major minor numbers
    colors: [default, bright_yellow, yellow]

  - pattern: ([A-Z][a-z]{2})\s([ 1-3]\d)\s(?:([0-2]?\d):([0-5]\d)(?=[\s,]|$)|\s*(\d{4}))
    name: Date-Time => G1=Month G2=Day G3=Hour G4=Minutes G5=Year
    colors: [unchanged, cyan, cyan, cyan, cyan, bold magenta]

  - pattern: \s(root|wheel)(?=\s|$)
    name: root
    colors: [unchanged, bold white on_red]

  - pattern: (\w+_u):(\w+_r):(\w+_t):(\w\d)
    name: SELinux
    colors: [default, green, yellow, cyan, magenta]

  - pattern: (-|([bcCdDlMnpPs?]))(?=[-r][-w][-xsStT][-r][-w][-xsStT][-r][-w][-xsStT])
    name: File Type
    colors: [unchanged, unchanged, bold white]

  - pattern: (?<=[-bcCdDlMnpPs?])(-|(r))(-|(w))(-|([xsStT]))(?=[-r][-w][-xsStT][-r][-w][-xsStT])
    name: owner rwx
    colors: [unchanged, unchanged, bright_green, unchanged, bright_green, unchanged, bright_green]

  - pattern: (?<=[-bcCdDlMnpPs?][-r][-w][-xsStT])(-|(r))(-|(w))(-|([xsStT]))(?=[-r][-w][-xsStT])
    name: group rwx
    colors: [unchanged, unchanged, yellow, unchanged, yellow, unchanged, yellow]

  - pattern: (?<=[-bcCdDlMnpPs?][-r][-w][-xsStT][-r][-w][-xsStT])(-|(r))(-|(w))(-|([xsStT]))
    name: other rwx
    colors: [unchanged, unchanged, bright_red, unchanged, bright_red, unchanged, bright_red]

  - pattern: (?<=[-bcCdDlMnpPs?])[-r][-w]([sStT])[-r][-w]([sStT])[-r][-w]([sStT])
    name: sStT all
    colors: [unchanged, bold green, bold yellow, bold red]

  - pattern: ^\S{10}(\+)
    name: ACL
    colors: [unchanged, on_cyan bold white]
